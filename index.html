<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 의학 퀴즈 & 오답노트 (PDF 기반)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f4f8; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-xl w-full max-w-5xl p-6 sm:p-10 space-y-8">
        <div class="text-center space-y-2">
            <div class="bg-blue-100 text-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">AI 맞춤형 퀴즈 & 오답노트</h1>
            <p class="text-sm text-gray-500">강의록 PDF를 업로드하면 의학 전문 교육자 AI가 시험 문제를 출제합니다.</p>
        </div>

        <div class="space-y-5 bg-gray-50 p-6 rounded-2xl border border-gray-200">
            <div>
                <label class="block text-sm font-bold text-blue-700 mb-1">1. Gemini API Key</label>
                <input type="password" id="apiKeyInput" placeholder="AIzaSy..." 
                    class="block w-full px-4 py-3 border border-gray-200 rounded-xl text-gray-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all bg-white">
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-bold text-gray-700">2. Source (강의록 PDF 업로드)</label>
                <input type="file" id="pdfFileInput" accept="application/pdf" 
                    class="block w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 transition-colors cursor-pointer border border-gray-200 rounded-xl p-1 bg-white">
                <p class="text-xs text-gray-500 mt-1 pl-1">※ 시험 범위에 해당하는 PDF 파일을 1개 올려주세요.</p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">난이도</label>
                    <select id="difficulty" class="block w-full px-4 py-3 border border-gray-200 rounded-xl text-sm text-gray-700 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                        <option value="쉬움">쉬움 (개념 확인)</option>
                        <option value="보통" selected>보통 (일반 국시 수준)</option>
                        <option value="어려움">어려움 (지엽적 야마/꼬아내기)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">문제 스타일</label>
                    <select id="quizType" class="block w-full px-4 py-3 border border-gray-200 rounded-xl text-sm text-gray-700 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                        <option value="4지선다">객관식 4지선다</option>
                        <option value="OX">문장 OX 문제</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">문제 개수</label>
                    <input type="number" id="questionCount" value="10" min="1" max="30"
                        class="block w-full px-4 py-3 border border-gray-200 rounded-xl text-sm text-gray-700 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                </div>
            </div>
        </div>

        <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl text-lg transition-colors shadow-md disabled:opacity-50">
            문제 생성 시작하기
        </button>

        <div id="statusArea" class="hidden flex-col items-center justify-center space-y-3 py-6">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
            <p id="statusText" class="text-md font-medium text-blue-600 text-center font-bold">준비 중...</p>
        </div>

        <div id="quizContainer" class="hidden space-y-8 border-t pt-8 mt-8 border-gray-200">
            <h3 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                <span>📝 실전 모의고사</span>
            </h3>
            <div id="quizContent" class="space-y-8">
                </div>
            
            <div class="pt-6">
                <button id="submitQuizBtn" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-4 rounded-xl text-lg transition-colors shadow-md">
                    답안 제출 및 채점하기
                </button>
            </div>

            <div id="resultArea" class="hidden space-y-6 pt-8 border-t border-gray-200">
                <div id="scoreResult" class="text-center text-2xl font-bold p-6 rounded-2xl shadow-sm">
                    </div>
                <div id="reviewNoteArea" class="hidden space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // 전역 변수로 퀴즈 데이터 저장
        let globalQuizData = [];

        const apiKeyInput = document.getElementById('apiKeyInput');
        const generateBtn = document.getElementById('generateBtn');
        const statusArea = document.getElementById('statusArea');
        const statusText = document.getElementById('statusText');
        const quizContainer = document.getElementById('quizContainer');
        const quizContent = document.getElementById('quizContent');
        const submitQuizBtn = document.getElementById('submitQuizBtn');
        const resultArea = document.getElementById('resultArea');
        const scoreResult = document.getElementById('scoreResult');
        const reviewNoteArea = document.getElementById('reviewNoteArea');
        const pdfFileInput = document.getElementById('pdfFileInput'); // ★ 추가된 PDF 파일 입력

        // 로컬스토리지에서 API 키 불러오기
        const savedApiKey = localStorage.getItem('gemini_api_key');
        if (savedApiKey) apiKeyInput.value = savedApiKey;
        apiKeyInput.addEventListener('change', () => localStorage.setItem('gemini_api_key', apiKeyInput.value.trim()));

        // --- ★ PDF 업로드용 Gemini File API 함수 (이전 코드 재활용) ★ ---
        async function uploadAndPollFile(blob, mimeType, apiKey, displayName) {
            const initRes = await fetch(`https://generativelanguage.googleapis.com/upload/v1beta/files?key=${apiKey}`, {
                method: 'POST',
                headers: {
                    'X-Goog-Upload-Protocol': 'resumable',
                    'X-Goog-Upload-Command': 'start',
                    'X-Goog-Upload-Header-Content-Length': blob.size.toString(),
                    'X-Goog-Upload-Header-Content-Type': mimeType,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ file: { display_name: displayName } })
            });

            if(!initRes.ok) {
                const err = await initRes.json();
                throw new Error(`업로드 초기화 실패: ${err.error?.message || '알 수 없는 오류'}`);
            }
            const uploadUrl = initRes.headers.get('X-Goog-Upload-URL');

            const uploadRes = await fetch(uploadUrl, {
                method: 'POST',
                headers: {
                    'X-Goog-Upload-Command': 'upload, finalize',
                    'X-Goog-Upload-Offset': '0',
                    'Content-Type': mimeType
                },
                body: blob
            });

            if(!uploadRes.ok) throw new Error(`파일 전송 실패`);
            const fileInfo = await uploadRes.json();
            return { uri: fileInfo.file.uri, name: fileInfo.file.name };
        }

        async function waitForFileActive(fileName, apiKey) {
            let state = 'PROCESSING';
            let attempts = 0;
            while (state === 'PROCESSING') {
                if (attempts > 0) await new Promise(resolve => setTimeout(resolve, 3000));
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${fileName}?key=${apiKey}`);
                if (!res.ok) throw new Error('파일 상태 확인 오류');
                const data = await res.json();
                state = data.state;
                if (state === 'FAILED') throw new Error('구글 서버가 PDF를 분석하는 데 실패했습니다.');
                attempts++;
                if (attempts > 40) throw new Error('파일 처리 시간 초과');
            }
        }
        // -------------------------------------------------------------

        // --- 1. 문제 생성 요청 로직 ---
        generateBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            const pdfFile = pdfFileInput.files[0];
            const difficulty = document.getElementById('difficulty').value;
            const quizType = document.getElementById('quizType').value;
            let questionCount = parseInt(document.getElementById('questionCount').value) || 10; 

            if (!apiKey) { alert('API 키를 입력해주세요.'); return; }
            if (!pdfFile) { alert('강의록 PDF 파일을 업로드해주세요.'); return; }
            if (questionCount < 1 || questionCount > 30) { alert('문제 개수는 1개에서 30개 사이여야 합니다.'); return; }

            // UI 초기화
            generateBtn.disabled = true;
            statusArea.classList.remove('hidden');
            statusArea.classList.add('flex');
            quizContainer.classList.add('hidden');
            quizContent.innerHTML = '';
            resultArea.classList.add('hidden');
            reviewNoteArea.classList.add('hidden');
            submitQuizBtn.classList.remove('hidden');
            submitQuizBtn.disabled = false;

            try {
                // 모델 설정
                const modelRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                if (!modelRes.ok) throw new Error("API 키가 유효하지 않거나 한도 초과입니다.");
                const modelData = await modelRes.json();
                const validModels = modelData.models.filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent'));
                let bestModel = validModels.find(m => m.name === 'models/gemini-2.5-flash') || validModels.find(m => m.name === 'models/gemini-3-flash') || validModels[0];

                // ★ PDF 업로드 처리 ★
                statusText.innerText = '1/3: 🚀 강의록(PDF) 구글 서버로 업로드 중...';
                const uploadedPdf = await uploadAndPollFile(pdfFile, 'application/pdf', apiKey, "Lecture_Quiz_Source.pdf");
                
                statusText.innerText = '2/3: ⏳ AI가 문서를 읽고 소화하는 중입니다...';
                await waitForFileActive(uploadedPdf.name, apiKey);

                statusText.innerText = `3/3: 🧠 의학 전문 교육자 AI가 출제 중입니다... (약 10~30초 소요)`;

                // ⭐️ 통제된 프롬프트 ⭐️
                const promptText = `
당신은 '의학 전문 교육자'입니다. 첨부된 [강의록 PDF] 문서의 내용만을 기반으로 의대생 복습용 퀴즈를 출제하세요.

[출제 설정]
- 문제 개수: 정확히 ${questionCount}개
- 난이도: ${difficulty}
- 문제 유형: ${quizType}

[⭐️ 출제 제약 사항 (엄격 준수) ⭐️]
1. 언어 혼용 규칙 (Korean Sentences + English Terms):
   - 질문의 문장, 보기의 서술, 해설 등은 반드시 '자연스러운 한국어'로 작성하세요.
   - 질환명, 해부학적 명칭, 약물명, 증상, 수치 등 의학 전문 용어는 반드시 '영어(English) 원문'만 사용하세요.
   - ❌ 금지: 전문 용어 뒤에 한글 번역이나 괄호를 병기하지 마십시오. (예: Liver(간) -> ❌, Liver -> ⭕️)
2. Source: 오직 첨부된 PDF 내용만으로 출제하세요. 외부 지식 개입 절대 금지.

[⭐️ 가장 많이 쓰이는 표준 JSON 구조 요구사항 ⭐️]
- 어떠한 설명이나 Markdown 백틱 없이, 오직 아래의 순수 JSON 배열(Array) 형식만 출력하세요.
[
  {
    "question": "문제 내용 (한국어 + 영어 용어 혼용)",
    "options": ["${quizType === 'OX' ? 'O' : '보기1'}", "${quizType === 'OX' ? 'X' : '보기2'}" ${quizType === 'OX' ? '' : ', "보기3", "보기4"}],
    "answer": 0, // 정답 보기의 인덱스 번호 (0부터 시작)
    "explanation": "해설 내용 (한국어 + 영어 용어 혼용)"
  }
]
`;

                const url = `https://generativelanguage.googleapis.com/v1beta/${bestModel.name}:generateContent?key=${apiKey}`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [
                                { text: promptText },
                                { fileData: { mimeType: "application/pdf", fileUri: uploadedPdf.uri } } // ★ 업로드된 PDF URI 연결
                            ] 
                        }],
                        generationConfig: { responseMimeType: "application/json" } // JSON 강제 옵션
                    })
                });

                if (!res.ok) throw new Error("문제를 생성하는 도중 구글 서버 오류가 발생했습니다.");
                const resData = await res.json();
                
                let rawJsonText = resData.candidates[0].content.parts[0].text;
                rawJsonText = rawJsonText.replace(/```json/g, '').replace(/```/g, '').trim();
                
                globalQuizData = JSON.parse(rawJsonText);
                
                renderQuiz(globalQuizData, quizType);

                statusArea.classList.add('hidden');
                statusArea.classList.remove('flex');
                quizContainer.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                statusText.innerText = "❌ 문제 생성 실패: " + error.message;
                statusText.classList.replace('text-blue-600', 'text-red-500');
            } finally {
                generateBtn.disabled = false;
            }
        });

        // --- 2. 퀴즈 렌더링 ---
        function renderQuiz(quizArray, quizType) {
            quizContent.innerHTML = '';
            
            quizArray.forEach((q, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'bg-white p-6 md:p-8 rounded-2xl border border-gray-200 shadow-sm quiz-item';
                qDiv.id = `q_item_${index}`;

                const titleHtml = `<h4 class="text-lg font-bold text-gray-800 mb-5 leading-relaxed"><span class="text-blue-600 mr-1">Q${index + 1}.</span> ${q.question}</h4>`;
                
                const gridClass = quizType === 'OX' ? 'grid md:grid-cols-2 gap-4' : 'grid md:grid-cols-2 gap-4';
                let optionsHtml = `<div class="${gridClass}">`;
                
                q.options.forEach((opt, optIdx) => {
                    optionsHtml += `
                        <label class="flex items-start p-4 border border-gray-200 rounded-xl cursor-pointer hover:bg-blue-50 transition-colors option-label bg-gray-50">
                            <input type="radio" name="q_${index}" value="${optIdx}" class="mt-1 w-5 h-5 text-blue-600 focus:ring-blue-500 flex-shrink-0">
                            <span class="ml-3 text-md text-gray-700 font-medium">${opt}</span>
                        </label>
                    `;
                });
                optionsHtml += '</div>';

                qDiv.innerHTML = titleHtml + optionsHtml;
                quizContent.appendChild(qDiv);
            });
        }

        // --- 3. 채점 및 오답노트(Review Note) 로직 ---
        submitQuizBtn.addEventListener('click', () => {
            let correctCount = 0;
            const totalCount = globalQuizData.length;
            let wrongAnswersData = []; 

            document.querySelectorAll('input[type="radio"]').forEach(radio => radio.disabled = true);

            globalQuizData.forEach((q, index) => {
                const qDiv = document.getElementById(`q_item_${index}`);
                const selectedOption = document.querySelector(`input[name="q_${index}"]:checked`);
                const labels = qDiv.querySelectorAll('.option-label');
                
                labels.forEach(l => {
                    l.classList.remove('bg-gray-50', 'border-gray-200', 'bg-red-50', 'border-red-300', 'bg-green-50', 'border-green-400');
                    l.classList.add('bg-gray-50', 'border-gray-200', 'opacity-50'); 
                });

                let isCorrect = false;

                if (selectedOption) {
                    const selectedVal = parseInt(selectedOption.value);
                    if (selectedVal === q.answer) {
                        correctCount++;
                        isCorrect = true;
                        selectedOption.parentElement.classList.add('bg-green-50', 'border-green-400', 'opacity-100');
                        selectedOption.parentElement.classList.remove('bg-gray-50', 'border-gray-200', 'opacity-50');
                    } else {
                        selectedOption.parentElement.classList.add('bg-red-50', 'border-red-300', 'opacity-100');
                        selectedOption.parentElement.classList.remove('bg-gray-50', 'border-gray-200', 'opacity-50');
                        labels[q.answer].classList.add('bg-green-50', 'border-green-400', 'opacity-100');
                        labels[q.answer].classList.remove('bg-gray-50', 'border-gray-200', 'opacity-50');
                    }
                } else {
                    labels[q.answer].classList.add('bg-green-50', 'border-green-400', 'opacity-100');
                    labels[q.answer].classList.remove('bg-gray-50', 'border-gray-200', 'opacity-50');
                }

                if (!isCorrect) wrongAnswersData.push({ qNum: index + 1, data: q });
            });

            submitQuizBtn.disabled = true;
            submitQuizBtn.innerText = '채점 완료';
            submitQuizBtn.classList.replace('bg-slate-800', 'bg-gray-400');
            submitQuizBtn.classList.replace('hover:bg-slate-900', 'hover:bg-gray-400');

            // --- 결과 출력 ---
            resultArea.classList.remove('hidden');
            
            const scorePercent = Math.round((correctCount/totalCount)*100);
            scoreResult.innerText = `총 ${totalCount}문제 중 ${correctCount}문제 정답 (${scorePercent}점)`;
            
            if (correctCount === totalCount) {
                scoreResult.className = 'text-center text-2xl font-bold p-6 rounded-2xl shadow-sm bg-green-100 text-green-700 border border-green-200';
            } else if (scorePercent >= 60) {
                scoreResult.className = 'text-center text-2xl font-bold p-6 rounded-2xl shadow-sm bg-blue-50 text-blue-700 border border-blue-200';
            } else {
                scoreResult.className = 'text-center text-2xl font-bold p-6 rounded-2xl shadow-sm bg-red-50 text-red-600 border border-red-200';
            }

            // --- ⭐️ 오답 노트 렌더링 ---
            reviewNoteArea.innerHTML = '';
            if (wrongAnswersData.length === 0) {
                reviewNoteArea.innerHTML = `<div class="text-green-600 font-bold text-2xl text-center py-10">🎉 완벽합니다! 복습할 내용이 없습니다.</div>`;
            } else {
                let reviewHtml = `
                    <div class="mt-8 mb-6 flex items-center justify-between">
                        <h3 class="text-2xl font-bold text-slate-800">📚 Review Note <span class="text-sm font-normal text-slate-500 ml-2">틀린 문제 다시보기</span></h3>
                        <span class="px-3 py-1 bg-red-100 text-red-600 rounded-full text-sm font-bold">${wrongAnswersData.length}개 오답</span>
                    </div>
                    <div class="space-y-6">
                `;
                
                wrongAnswersData.forEach(item => {
                    reviewHtml += `
                    <div class="bg-white p-6 rounded-2xl border-l-4 border-l-red-500 border border-gray-200 shadow-sm">
                        <p class="font-bold text-lg text-gray-800 mb-4 leading-relaxed"><span class="text-red-500 mr-1">Q${item.qNum}.</span> ${item.data.question}</p>
                        
                        <div class="bg-blue-50 p-4 rounded-xl mb-4 border border-blue-100">
                            <p class="text-sm text-blue-800 font-bold mb-1">✅ Correct Answer</p>
                            <p class="text-md text-gray-800 font-medium">${item.data.options[item.data.answer]}</p>
                        </div>
                        
                        <div>
                            <p class="text-sm text-gray-500 font-bold mb-1">💡 Explanation</p>
                            <p class="text-sm text-gray-700 leading-relaxed">${item.data.explanation}</p>
                        </div>
                    </div>`;
                });
                reviewHtml += `</div>`;
                reviewNoteArea.innerHTML = reviewHtml;
            }
            reviewNoteArea.classList.remove('hidden');
            
            setTimeout(() => {
                resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 300);
        });
    </script>
</body>
</html>
